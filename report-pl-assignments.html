:root {
  --paper: #edf1f3;
  --surface: #ffffff;
  --ink: #17212a;
  --ink-soft: #57626c;
  --line: #d7dee3;
  --accent: #c8631f;
  --accent-ink: #ffffff;
  --maint-tint: #f7e8dc;
  --maint-ink: #8a4315;
  --finance-tint: #e1eee7;
  --finance-ink: #2f6e58;
  --good: #2f6e58;
  --warn: #a8641a;
  --bad: #b13b2f;
  --shadow: 0 1px 2px rgba(23,33,42,0.06), 0 6px 20px rgba(23,33,42,0.05);
}
@media (prefers-color-scheme: dark) {
  :root {
    --paper: #10161c; --surface: #171f27; --ink: #e7ecef; --ink-soft: #93a0aa; --line: #2a343d;
    --accent: #e2915a; --accent-ink: #17212a; --maint-tint: #2c2115; --maint-ink: #eab087;
    --finance-tint: #142822; --finance-ink: #7fc4a6;
    --good: #7fc4a6; --warn: #e0a75e; --bad: #e0796a;
    --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 8px 24px rgba(0,0,0,0.35);
  }
}
:root[data-theme="dark"] {
  --paper: #10161c; --surface: #171f27; --ink: #e7ecef; --ink-soft: #93a0aa; --line: #2a343d;
  --accent: #e2915a; --accent-ink: #17212a; --maint-tint: #2c2115; --maint-ink: #eab087;
  --finance-tint: #142822; --finance-ink: #7fc4a6;
  --good: #7fc4a6; --warn: #e0a75e; --bad: #e0796a;
  --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 8px 24px rgba(0,0,0,0.35);
}
:root[data-theme="light"] {
  --paper: #edf1f3; --surface: #ffffff; --ink: #17212a; --ink-soft: #57626c; --line: #d7dee3;
  --accent: #c8631f; --accent-ink: #ffffff; --maint-tint: #f7e8dc; --maint-ink: #8a4315;
  --finance-tint: #e1eee7; --finance-ink: #2f6e58;
  --good: #2f6e58; --warn: #a8641a; --bad: #b13b2f;
  --shadow: 0 1px 2px rgba(23,33,42,0.06), 0 6px 20px rgba(23,33,42,0.05);
}


* { box-sizing: border-box; }
html, body { background: var(--paper); color: var(--ink); font-family: 'IBM Plex Sans', system-ui, sans-serif; margin: 0; padding: 0; }
body { padding: clamp(20px, 4vh, 40px) clamp(20px, 6vw, 48px) 64px; }
.wrap { max-width: 1040px; margin: 0 auto; }

.masthead { border-bottom: 3px solid var(--ink); padding-bottom: 16px; margin-bottom: clamp(20px, 4vh, 32px); display: flex; justify-content: space-between; align-items: flex-end; gap: 16px; flex-wrap: wrap; }
.masthead-id { font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); font-weight: 500; margin: 0 0 6px; display: flex; align-items: center; gap: 8px; }
.masthead-id a { color: var(--ink-soft); text-decoration: none; }
.masthead-id a:hover { color: var(--accent); }
h1 { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: clamp(22px, 3vw, 30px); letter-spacing: 0.01em; text-transform: uppercase; margin: 0; line-height: 1.05; text-wrap: balance; }
.masthead-meta { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--ink-soft); text-align: right; line-height: 1.6; }
.masthead-meta strong { color: var(--ink); font-weight: 500; }

.section-label { font-family: 'Oswald', sans-serif; font-weight: 500; font-size: 13px; letter-spacing: 0.13em; text-transform: uppercase; color: var(--ink-soft); margin: 0 0 12px; display: flex; align-items: center; gap: 10px; }
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--line); }
section { margin-bottom: clamp(28px, 4vh, 44px); }

.table-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 3px; background: var(--surface); box-shadow: var(--shadow); }
table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--line); white-space: nowrap; }
th { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-soft); font-weight: 500; background: var(--paper); }
td.num, th.num { font-family: 'IBM Plex Mono', monospace; font-variant-numeric: tabular-nums; text-align: right; }
td.detail, th.detail { white-space: normal; min-width: 220px; color: var(--ink-soft); }
tr:last-child td { border-bottom: none; }
tr.total td { font-weight: 600; background: var(--paper); }
td.prop { font-weight: 600; }
td.num.bad { color: var(--bad); font-weight: 500; }
td.num.good { color: var(--good); font-weight: 500; }

.avg-callout { display: flex; align-items: baseline; gap: 10px; background: var(--surface); border: 1px solid var(--line); border-radius: 3px; padding: 12px 16px; box-shadow: var(--shadow); margin-bottom: 14px; }
.avg-callout .avg-label { font-family: 'Oswald', sans-serif; font-weight: 500; font-size: 12.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-soft); }
.avg-callout .avg-value { font-family: 'IBM Plex Mono', monospace; font-size: 22px; font-weight: 500; font-variant-numeric: tabular-nums; color: var(--ink); }

.month-picker { font-family: 'IBM Plex Mono', monospace; font-size: 12px; }
.month-picker select {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  color: var(--ink);
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 3px;
  padding: 5px 10px;
  cursor: pointer;
}
.month-picker select:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
.pill { font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 10px; display: inline-block; }
.pill.bad { background: color-mix(in srgb, var(--bad) 16%, var(--surface)); color: var(--bad); }
.pill.warn { background: color-mix(in srgb, var(--warn) 16%, var(--surface)); color: var(--warn); }
.pill.good { background: color-mix(in srgb, var(--good) 16%, var(--surface)); color: var(--good); }

.prose { font-size: 14px; line-height: 1.65; max-width: 68ch; }
.prose p + p { margin-top: 14px; }

.callout { border-left: 3px solid var(--accent); background: var(--surface); border-radius: 0 3px 3px 0; padding: 14px 18px; box-shadow: var(--shadow); font-size: 13px; line-height: 1.6; }
.callout.finance { border-left-color: var(--finance-ink); }
.callout.maintenance { border-left-color: var(--maint-ink); }

.stat-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
.stat { background: var(--surface); border: 1px solid var(--line); border-radius: 3px; padding: 14px 16px; box-shadow: var(--shadow); }
.stat-label { font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-soft); margin: 0 0 6px; }
.stat-value { font-family: 'IBM Plex Mono', monospace; font-size: 22px; font-weight: 500; font-variant-numeric: tabular-nums; margin: 0; }
.stat-value.bad { color: var(--bad); }
.stat-value.good { color: var(--good); }

.tag { font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 8px; border-radius: 2px; }
.tag.maintenance { background: var(--maint-tint); color: var(--maint-ink); }
.tag.finance { background: var(--finance-tint); color: var(--finance-ink); }

footer { margin-top: clamp(24px, 4vh, 40px); padding-top: 16px; border-top: 1px solid var(--line); font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; color: var(--ink-soft); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
footer a { color: var(--ink-soft); }

</style>

<div class="wrap">
  <div class="masthead">
    <div>
      <p class="masthead-id"><a href="index.html">&larr; Florencia Reports</a> &middot; <span class="tag finance">Finance</span></p>
      <h1>P&amp;L Assignments &mdash; R&amp;M / Grounds / Appliances</h1>
    </div>
    <div class="masthead-meta">
      <div class="month-picker" style="margin-bottom:6px;">
        <select id="month-select"></select>
      </div>
      <span id="sent-label"></span>
    </div>
  </div>

  <div id="content-root">
    <p style="font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--ink-soft);">Loading&hellip;</p>
  </div>

  <footer>
    <span><a href="index.html">&larr; Back to Florencia Reports</a></span>
    <span id="updated-label">Updated 2026-07-10</span>
  </footer>
</div>

<script>
function money(v) { return v === null || v === undefined ? '&mdash;' : '$' + Number(v).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}); }
function vsAvgClass(v, avg) { if (v === null || v === undefined || v === 0) return ''; return v > avg ? 'bad' : 'good'; }

function renderTable(rows, avg) {
  var head = '<tr><th>Property</th><th class="num">Budget</th><th class="num">Actual $/Unit</th><th class="detail">Detail</th></tr>';
  var body = rows.map(function(r) {
    var cls = vsAvgClass(r.actual_per_unit, avg);
    return '<tr><td class="prop">' + r.property + '</td><td class="num">' + money(r.budget) + '</td><td class="num ' + cls + '">' + money(r.actual_per_unit) + '</td><td class="detail">' + (r.detail || '') + '</td></tr>';
  }).join('');
  return '<div class="table-wrap"><table>' + head + body + '</table></div>';
}

function renderAppliancesTable(items) {
  var head = '<tr><th>Unit</th><th class="num">Amount</th><th>Cardholder</th><th class="detail">Appliance</th></tr>';
  var body = items.map(function(r) {
    return '<tr><td class="prop">' + (r.unit || r.property) + '</td><td class="num">' + money(r.amount) + '</td><td>' + (r.cardholder || '&mdash;') + '</td><td class="detail">' + r.appliance + '</td></tr>';
  }).join('');
  return '<div class="table-wrap"><table>' + head + body + '</table></div>';
}

function renderNarrative(paragraphs) {
  if (!paragraphs || !paragraphs.length) {
    return '<div class="callout" style="font-size:12.5px;">No narrative added yet for this month.</div>';
  }
  return '<div class="callout finance" style="margin-top:16px;"><div class="prose">' + paragraphs.map(function(p) { return '<p>' + p + '</p>'; }).join('') + '</div></div>';
}

function renderPortfolioSummary(portfolio) {
  if (!portfolio || !portfolio.repairs) {
    return '<div class="callout" style="font-size:12.5px;">Portfolio totals not available for this month (partial data only).</div>';
  }
  var r = portfolio.repairs, g = portfolio.grounds;
  return '<div class="stat-row">' +
    '<div class="stat"><p class="stat-label">R&amp;M-Repairs Budget</p><p class="stat-value">' + money(r.budget) + '</p></div>' +
    '<div class="stat"><p class="stat-label">R&amp;M-Repairs Actual</p><p class="stat-value bad">' + money(r.actual) + '</p></div>' +
    '<div class="stat"><p class="stat-label">Repairs Variance</p><p class="stat-value bad">+' + r.variance_pct + '%</p></div>' +
    '<div class="stat"><p class="stat-label">R&amp;M-Grounds Budget</p><p class="stat-value">' + money(g.budget) + '</p></div>' +
    '<div class="stat"><p class="stat-label">R&amp;M-Grounds Actual</p><p class="stat-value bad">' + money(g.actual) + '</p></div>' +
    '<div class="stat"><p class="stat-label">Grounds Variance</p><p class="stat-value bad">+' + g.variance_pct + '%</p></div>' +
    '</div>';
}

function renderMonth(budgetData, appliancesData) {
  var root = document.getElementById('content-root');
  var html = '';

  html += '<section><p class="section-label">Portfolio Summary</p>' + renderPortfolioSummary(budgetData.portfolio) + '</section>';

  if (!budgetData.complete) {
    html += '<section><div class="callout" style="font-size:12.5px;">This month only listed properties above average &mdash; no budget column or full property list was included, so this view can\'t show below-average properties or budget vs. actual the way a complete month can.' + (budgetData.note ? ' ' + budgetData.note : '') + '</div></section>';
  }

  html += '<section><p class="section-label">R&amp;M &mdash; Repairs' + (budgetData.complete ? '' : ' (above average)') + '</p>' +
    '<div class="avg-callout"><span class="avg-label">Average Repairs / Unit / Mo</span><span class="avg-value">$' + budgetData.averages.repairs_per_unit + '</span></div>' +
    renderTable(budgetData.repairs, budgetData.averages.repairs_per_unit) +
    renderNarrative(budgetData.narrative_repairs) +
    '</section>';

  html += '<section><p class="section-label">R&amp;M &mdash; Grounds' + (budgetData.complete ? '' : ' (above average)') + '</p>' +
    '<div class="avg-callout"><span class="avg-label">Average Grounds / Unit / Mo</span><span class="avg-value">$' + budgetData.averages.grounds_per_unit.toLocaleString() + '</span></div>' +
    renderTable(budgetData.grounds, budgetData.averages.grounds_per_unit) +
    renderNarrative(budgetData.narrative_grounds) +
    '</section>';

  html += '<section><p class="section-label">Appliances Breakdown &mdash; R&amp;M Team Members</p>' + renderAppliancesTable(appliancesData.items) + '</section>';

  root.innerHTML = html;
  document.getElementById('sent-label').textContent = 'Data as of ' + budgetData.generated_at;
  document.getElementById('updated-label').textContent = 'Updated ' + budgetData.generated_at;
}

var manifestCache = null;
var ts = Date.now();

function loadMonth(key) {
  Promise.all([
    fetch('./data/pl-budget-' + key + '.json?_=' + ts).then(function(r) { return r.json(); }),
    fetch('./data/pl-appliances-' + key + '.json?_=' + ts).then(function(r) { return r.json(); }),
  ]).then(function(results) {
    renderMonth(results[0], results[1]);
  }).catch(function(err) {
    document.getElementById('content-root').innerHTML = '<div class="callout" style="font-size:13px;">Could not load data for this month: ' + err.message + '</div>';
  });
}

fetch('./data/pl-manifest.json?_=' + ts).then(function(r) { return r.json(); }).then(function(manifest) {
  manifestCache = manifest;
  var select = document.getElementById('month-select');
  manifest.months.forEach(function(m, i) {
    var opt = document.createElement('option');
    opt.value = m.key;
    opt.textContent = m.label;
    select.appendChild(opt);
  });
  select.addEventListener('change', function() { loadMonth(this.value); });
  loadMonth(manifest.months[0].key);
}).catch(function(err) {
  document.getElementById('content-root').innerHTML = '<div class="callout" style="font-size:13px;">Could not load report manifest: ' + err.message + '</div>';
});
</script>
