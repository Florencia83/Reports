name: Update P&L Assignment data (monthly)

on:
  schedule:
    - cron: '17 9 1 * *'  # 1st of each month, 09:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Pull AppFolio budget/actual
        env:
          APPFOLIO_CLIENT_ID: ${{ secrets.APPFOLIO_CLIENT_ID }}
          APPFOLIO_CLIENT_SECRET: ${{ secrets.APPFOLIO_CLIENT_SECRET }}
        run: node scripts/update-pl-data.js

      - name: Pull Ramp appliances
        env:
          RAMP_CLIENT_ID: ${{ secrets.RAMP_CLIENT_ID }}
          RAMP_CLIENT_SECRET: ${{ secrets.RAMP_CLIENT_SECRET }}
        run: node scripts/update-ramp-appliances.js

      - name: Commit and push if changed
        run: |
          git config user.name "florencia-reports-bot"
          git config user.email "actions@github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Automated P&L data refresh $(date -u +%Y-%m-%d)"
            git push
          fi
